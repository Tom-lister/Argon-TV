<!doctype html>
<html lang="en">
  <head>
    <title>Argon TV</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script type="importmap">
      {
        "imports": {
          "random-seedable": "https://esm.sh/random-seedable@1"
        }
      }
    </script>
  </head>
  <body>
    <div id="splash-screen">
      <!-- TODO - fixedsys font -->
      <p>Welcome to Argon TV</p>
      <button id="start-btn">Enter</button>
    </div>
    <div id="above-schedule">
      <img src="Argon TV logo.png" alt="Argon Logo" id="argon-logo" />
      <div id="video-container">
        <div id="video-foreground">
          <div id="yt-player"></div>
        </div>
        <div id="banner-container"></div>
      </div>
      <p id="video-footer">
        Currently playing: <span id="current-video-title"></span>
      </p>
    </div>
    <p id="schedule-indicator">Schedule</p>
    <img src="down-arrow.png" alt="Arrow Down" id="down-arrow" />
    <div id="schedule-container">
      <div class="daily-schedule">
        <p>Today's Schedule</p>
        <table id="today-schedule"></table>
      </div>
      <div class="daily-schedule">
        <p>Tomorrow's Schedule</p>
        <table id="tomorrow-schedule"></table>
      </div>
    </div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js" type="module"></script>
  </body>
</html>
