<!doctype html>
<html lang="en">
  <head>
    <title>Argon TV</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script type="importmap">
      {
        "imports": {
          "random-seedable": "https://esm.sh/random-seedable@1"
        }
      }
    </script>
  </head>
  <body>
    <div id="above-schedule">
      <img src="logo.png" alt="Argon Logo" id="argon-logo" />
      <div id="video-container">
        <div id="video-foreground">
          <div id="yt-player"></div>
        </div>
        <button
          type="button"
          class="unmute-btn"
          id="unmute-btn"
          aria-label="Unmute"
        >
          Unmute
        </button>
      </div>
      <p id="video-footer">
        Currently playing: <span id="current-video-title"></span>
      </p>
    </div>
    <p id="schedule-indicator">Schedule</p>
    <img src="down-arrow.png" alt="Arrow Down" id="down-arrow" />
    <div id="schedule-container"></div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js" type="module"></script>
  </body>
</html>
